<html>
    <head>
       <title>Exemplo de Tabela</title>
    </head>
    <body>
        <table border="1">
            <tr>
                <th>Segunda-feira</th>
                <th>Terca-feira</th>
                <th>Quarta-feira</th>
                <th>Quinta-feira</th>
                <th>Sexta-feira</th>
            </tr>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
                <td>4</td>
                <td>5</td>
            </tr>
            <tr>
                <td>6</td>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td>10</td>
            </tr>
            <tr>
                <td>11</td>
                <td>12</td>
                <td>13</td>
                <td>14</td>
                <td>15</td>
            </tr>
             <tr>
                <td colspan="2" align="center">16</td>
                <td>17</td>
                <td>18</td>
                <td rowspan="2">19</td>
            </tr>
            <tr>
                <td>21</td>
                <td>22</td>
                <td>23</td>
                <td>24</td>
            </tr>

        </table>
    </body>
</html>
